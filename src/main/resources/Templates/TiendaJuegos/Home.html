<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inicio - Tienda de Videojuegos</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1>🎮 Bienvenido al sistema</h1>
        <p class="text-muted">Selecciona una opción para continuar</p>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-3">
            <a th:href="@{/juego/listado}" class="text-decoration-none">
                <div class="card shadow text-center p-4 h-100">
                    <i class="fa-solid fa-gamepad fa-3x text-primary"></i>
                    <h5 class="mt-3">Juegos</h5>
                </div>
            </a>
        </div>

		<div class="col-md-3">
		    <a th:href="@{/compra/listado}" class="text-decoration-none">
		        <div class="card shadow text-center p-4 h-100">
		            <i class="fa-solid fa-file-invoice-dollar fa-3x text-success"></i>
		            <h5 class="mt-3">Boletas</h5>
		        </div>
		    </a>
		</div>

        <div class="col-md-3">
            <a th:href="@{/categoria/listado}" class="text-decoration-none">
                <div class="card shadow text-center p-4 h-100">
                    <i class="fa-solid fa-tags fa-3x text-warning"></i>
                    <h5 class="mt-3">Categorías</h5>
                </div>
            </a>
        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:if="${param.login}">
    Swal.fire({
        icon: 'success',
        title: '¡Bienvenido!',
        text: 'Inicio de sesión exitoso.',
        confirmButtonText: 'Continuar'
    });
</script>
</body>
</html>
