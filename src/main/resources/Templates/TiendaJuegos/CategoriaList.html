<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Listado de Categorías</title>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<style>
		body {
			background: #f4f6f9;
		}

		.sidebar {
			width: 250px;
			height: 100vh;
			position: fixed;
			top: 0;
			left: 0;
			background: #212529;
			padding: 20px;
		}

		.sidebar a {
			display: block;
			color: white;
			padding: 10px;
			margin-bottom: 8px;
			text-decoration: none;
			border-radius: 6px;
		}

		.sidebar a:hover {
			background: #343a40;
		}

		.content {
			margin-left: 270px;
			padding: 25px;
		}

		.card {
			border: none;
			border-radius: 12px;
		}
	</style>
</head>

<body>

<div class="sidebar">

	<h4 class="text-white text-center mb-4">🎮 Sistema</h4>

	<a th:href="@{/home}">
		<i class="fa-solid fa-house"></i> Inicio
	</a>

	<a th:href="@{/juego/listado}">
		<i class="fa-solid fa-gamepad"></i> Juegos
	</a>

	<a th:href="@{/compra/listado}">
		<i class="fa-solid fa-box"></i> Compras
	</a>

	<a th:href="@{/categoria/listado}">
		<i class="fa-solid fa-tags"></i> Categorías
	</a>

	<hr style="border-color: gray;">

	<a th:href="@{/logout}" style="color:#ff6b6b;">
		<i class="fa-solid fa-right-from-bracket"></i> Salir
	</a>

</div>

<div class="content">

	<div class="card shadow-sm">
		<div class="card-body">

			<div class="d-flex justify-content-between align-items-center mb-3">
				<h2 class="m-0">Listado de Categorías</h2>

				<a th:href="@{/categoria/nuevo}" class="btn btn-success">
					<i class="fa-solid fa-plus"></i> Nuevo
				</a>
			</div>

			<table class="table table-hover align-middle">
				<thead class="table-dark">
					<tr>
						<th class="text-center" style="width: 15%;">ID</th>
						<th>Nombre de la Categoría</th>
					</tr>
				</thead>

				<tbody class="table-light">
					<tr th:each="item : ${lstCategorias}">
						<td class="text-center" th:text="${item.idCategoria}"></td>
						<td th:text="${item.nombreCategoria}"></td>
					</tr>
				</tbody>
			</table>

		</div>
	</div>

</div>

</body>
</html>
