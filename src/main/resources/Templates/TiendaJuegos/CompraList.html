<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Historial de Compras</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">

				<div class="row mb-3 align-items-center">
					<div class="col-md-10">
						<h1 class="card-title m-0">Historial de Compras Realizadas</h1>
					</div>
					<div class="col-md-2">
						<a href="#" class="btn btn-success w-100">
							<i class="fa-solid fa-plus"></i> Nueva Compra
						</a>
					</div>
				</div>

				<table class="table table-hover table-responsive align-middle mt-4">
					<thead class="table-dark">
						<tr>
							<th class="text-center" style="width: 10%;">ID Compra</th>
							<th class="text-start">Videojuego Adquirido</th>
							<th class="text-center" style="width: 15%;">Cantidad</th>
							<th class="text-center" style="width: 15%;">Total Pagado</th>
							<th class="text-center" style="width: 25%;">Fecha y Hora</th>
						</tr>
					</thead>
					<tbody class="table-secondary">
						<tr th:each="item : ${lstCompras}">
							<td th:text="${item.idCompra}" class="text-center"></td>
							<td th:text="${item.juego.titulo}" class="text-start"></td>
							<td th:text="${item.cantidad}" class="text-center"></td>
							<td th:text="${'$' + item.total}" class="text-center"></td>
							<td th:text="${#temporals.format(item.fechaCompra, 'dd/MM/yyyy HH:mm')}" class="text-center"></td>
						</tr>
					</tbody>
				</table>

			</div>
		</div>
	</div>
</body>
</html>
