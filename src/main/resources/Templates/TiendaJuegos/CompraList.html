<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>HISTORIAL DE COMPRAS</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css">
		<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
		<script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>
	</head>

	<body>
		<div class="container mt-5">
			<div class="card shadow-lg">
				<div class="card-body">
					<div class="row mb-4 align-items-center">
						<div class="col-md-10">
							<h1 class="card-title">Historial de Compras</h1>
						</div>
						<div class="col-md-2">
							<a th:href="@{/compra/nuevo}" class="btn btn-success w-100"> 
								<i class="fa-solid fa-plus"></i> Nuevo
							</a>
						</div>
					</div>

					<table id="tbl-compra" class="table table-hover table-responsive w-100">
						<thead class="table-dark text-center">
							<tr>
								<th>Id Compra</th>
								<th>Fecha de Compra</th>
								<th>Videojuego</th>
								<th>Cantidad</th>
								<th>Total</th>
								<th>Acciones</th>
							</tr>
						</thead>
						<tbody class="table-secondary">
							<tr th:each="item: ${lstCompras}">
								<td th:text="${item.idCompra}" class="text-center"></td>
								<td th:text="${#temporals.format(item.fechaCompra, 'dd/MM/yyyy HH:mm')}" class="text-center"></td>
								<td th:text="${item.juego.titulo}"></td>
								<td th:text="${item.cantidad}" class="text-end"></td>
								<td th:text="|S/. ${#numbers.formatDecimal(item.total, 1, 'COMMA', 2, 'POINT')}|" class="text-end"></td>
								<td class="text-center">
									<div class="d-flex justify-content-center align-items-center">
										<a th:href="@{/compra/edicion/{id}(id=${item.idCompra})}"
											class="btn btn-outline-primary" title="Editar" aria-label="Editar" role="button">
											<i class="fa-regular fa-pen-to-square"></i> Editar
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<th:block th:utext="${toast}"></th:block>

		<script>
			$(function () {
			
				var table = $('#tbl-compra').DataTable({
					language: {
						search: 'Buscar Compra (ID):',
						url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'
					},
					pageLength: 5, 
					lengthMenu: [5, 10, 25, 50],
					ordering: true,
					order: [
						[0, 'desc'] 
					],
					responsive: true,
					columnDefs: [
						{targets: [5], orderable: false}, 
						{targets: [5], searchable: false} 
					]
				});


				$('.dataTables_filter input').unbind().bind('keyup', function() {
					var value = this.value.trim();
					
					if (value) {
						
						table.column(0).search('^' + value + '$', true, false).draw();
					} else {
					
						table.column(0).search('').draw();
					}
				});
			});
		</script>
	</body>

	</html>
