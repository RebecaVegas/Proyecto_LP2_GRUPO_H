<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>HISTORIAL DE COMPRAS</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css">
		<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
		<script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>
	</head>

	<body>
		<div class="container mt-5">
			<div class="card shadow-lg">
				<div class="card-body">
					<div class="row mb-4 align-items-center">
						<div class="col-md-10">
							<h1 class="card-title">Historial de Compras</h1>
						</div>
						<div class="col-md-2">
							<a th:href="@{/compra/nuevo}" class="btn btn-success w-100"> 
								<i class="fa-solid fa-plus"></i> Nuevo
							</a>
						</div>
					</div>
					<div class="row mb-3">
										<fieldset class="border border-2 border-dark pb-2">
											<legend class="float-none w-auto px-2">Filtros</legend>
											<div th:if="${error}" class="alert alert-danger py-2 mb-2" role="alert">
											            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
											        </div>
											<form method="get" th:action="@{/compra/filtrar}" >
												<div class="row align-items-end">
													<div class="col-md-6">
														<label for="idCompra" class="form-label">Filtrar por ID de Compra:</label>
														                    <input type="number" id="idCompra" name="idCompra" class="form-control" 
														                           placeholder="Ej. 15" th:value="${filtroActual}">
													</div>
													<div class="col-md-6 text-end">
														<button type="submit" class="btn btn-outline-dark">
															<i class="fa-solid fa-binoculars"></i> Buscar
														</button>
														<a th:href="@{/compra/filtrar}" class="btn btn-outline-secondary">
															<i class="fa-solid fa-broom"></i> Limpiar
														</a>
													</div>
												</div>
											</form>
										</fieldset>
									</div>


					<table id="tbl-compra" class="table table-hover table-responsive w-100">
						<thead class="table-dark text-center">
							<tr>
								<th>Id Compra</th>
								<th>Fecha de Compra</th>
								<th>Videojuego</th>
								<th>Cantidad</th>
								<th>Total</th>
								<th>Acciones</th>
							</tr>
						</thead>
						<tbody class="table-secondary">
							<tr th:each="item: ${lstCompras}">
								<td th:text="${item.idCompra}" class="text-center"></td>
								<td th:text="${#temporals.format(item.fechaCompra, 'dd/MM/yyyy HH:mm')}" class="text-center"></td>
								<td th:text="${item.juego.titulo}"></td>
								<td th:text="${item.cantidad}" class="text-end"></td>
								<td th:text="|S/. ${#numbers.formatDecimal(item.total, 1, 'COMMA', 2, 'POINT')}|" class="text-end"></td>
								<td class="text-center">
									<div class="d-flex justify-content-center align-items-center">
										<a th:href="@{/compra/edicion/{id}(id=${item.idCompra})}"
											class="btn btn-outline-primary" title="Editar" aria-label="Editar" role="button">
											<i class="fa-regular fa-pen-to-square"></i> Editar
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<th:block th:utext="${toast}"></th:block>

		<script>
				$(document).ready(function () {
					$('#tbl-compra').DataTable({
						language: {
							search: "Buscar: ",
							url: 'https://cdn.datatables.net/plug-ins/2.0.3/i18n/es-ES.json',
						}
					});
				});
			</script>
		</script>
	</body>

	</html>
