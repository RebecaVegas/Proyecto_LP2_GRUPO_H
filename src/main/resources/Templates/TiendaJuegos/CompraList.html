<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Historial de Compras</title>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<style>
		
		.sidebar {
			width: 250px;
			height: 100vh;
			position: fixed;
			top: 0;
			left: 0;
			background: #212529;
			padding: 20px;
		}

		.sidebar a {
			display: block;
			color: white;
			padding: 10px;
			margin-bottom: 8px;
			text-decoration: none;
			border-radius: 6px;
		}

		.sidebar a:hover {
			background: #343a40;
		}

		.content {
			margin-left: 270px;
			padding: 25px;
		}

		.card {
			border: none;
			border-radius: 12px;
		}
	</style>
</head>

<body>

<div class="sidebar">

	<h4 class="text-white text-center mb-4">🎮 Sistema</h4>

	<a th:href="@{/home}">
		<i class="fa-solid fa-house"></i> Inicio
	</a>

	<a th:href="@{/juego/listado}">
		<i class="fa-solid fa-gamepad"></i> Juegos
	</a>

	<a th:href="@{/compra/listado}">
		<i class="fa-solid fa-box"></i> Compras
	</a>

	<a th:href="@{/categoria/listado}">
		<i class="fa-solid fa-tags"></i> Categorías
	</a>

	<hr style="border-color: gray;">

	<a href="#" style="color:#ff6b6b;" id="cerrarSesionLink">
		<i class="fa-solid fa-right-from-bracket"></i> Salir
	</a>

</div>

<!-- 🔹 CONTENIDO -->
<div class="content">

	<div class="card shadow-sm">
		<div class="card-body">

			<div class="d-flex justify-content-between align-items-center mb-3">
				<h2 class="m-0">Historial de Compras</h2>

				<a th:href="@{/compra/nuevo}" class="btn btn-success">
					<i class="fa-solid fa-plus"></i> Nuevo
				</a>
			</div>

			<!-- 🔹 FILTROS -->
			<fieldset class="border border-2 p-3 mb-3">
				<legend class="float-none w-auto px-2">Filtros</legend>

				<div th:if="${error}" class="alert alert-danger py-2">
					<i class="fa-solid fa-circle-exclamation"></i>
					<span th:text="${error}"></span>
				</div>

				<form method="get" th:action="@{/compra/filtrar}" class="row align-items-end">

					<div class="col-md-6">
						<label class="form-label">ID de Compra:</label>
						<input type="number" name="idCompra" class="form-control"
							   placeholder="Ej. 15" th:value="${filtroActual}">
					</div>

					<div class="col-md-6 text-end">
						<button class="btn btn-dark">
							<i class="fa-solid fa-binoculars"></i> Buscar
						</button>

						<a th:href="@{/compra/filtrar}" class="btn btn-secondary">
							<i class="fa-solid fa-broom"></i> Limpiar
						</a>
					</div>

				</form>
			</fieldset>

			<!-- 🔹 TABLA -->
			<table id="tbl-compra" class="table table-hover w-100 align-middle">
				<thead class="table-dark text-center">
					<tr>
						<th>Id</th>
						<th>Fecha</th>
						<th>Videojuego</th>
						<th>Cantidad</th>
						<th>Total</th>
						<th>Acciones</th>
					</tr>
				</thead>

				<tbody class="table-light">
					<tr th:each="item : ${lstCompras}">
						<td class="text-center" th:text="${item.idCompra}"></td>
						<td class="text-center" th:text="${#temporals.format(item.fechaCompra, 'dd/MM/yyyy HH:mm')}"></td>
						<td th:text="${item.juego.titulo}"></td>
						<td class="text-end" th:text="${item.cantidad}"></td>
						<td class="text-end"
							th:text="|S/. ${#numbers.formatDecimal(item.total, 1, 'COMMA', 2, 'POINT')}|"></td>

						<td class="text-center">
							<a th:href="@{/compra/edicion/{id}(id=${item.idCompra})}"
							   class="btn btn-outline-primary btn-sm">
								<i class="fa-regular fa-pen-to-square"></i> Editar
							</a>
						</td>
					</tr>
				</tbody>
			</table>

		</div>
	</div>

</div>

<script>
		document.getElementById("cerrarSesionLink").addEventListener("click", function (event) {
			event.preventDefault(); // Evita la acción por defecto del enlace
			
			Swal.fire({
				title: "¿Deseas cerrar sesión?",
				icon: "warning",
				showCancelButton: true,
				confirmButtonColor: "#3085d6",
				cancelButtonColor: "#d33",
				confirmButtonText: "Sí, cerrar",
				cancelButtonText: "No"
			}).then((result) => {
				if (result.isConfirmed) {
					window.location.href = "/login/cerrar-sesion";
				}
			});
		});
	</script>


</body>
</html>
