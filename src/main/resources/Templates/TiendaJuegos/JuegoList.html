<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Listado de Juegos</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">

				<div class="row mb-3 align-items-center">
					<div class="col-md-10">
						<h1 class="card-title m-0">Listado de Juegos</h1>
					</div>
					<div class="col-md-2">
						<a href="#" class="btn btn-success w-100">
							<i class="fa-solid fa-plus"></i> Nuevo
						</a>
					</div>
				</div>

				<form method="get" th:action="@{/juego/listado}" class="row mb-4">
					<div class="col-md-4">
						<select class="form-select" name="idCategoria">
							<option value="">-- Todas las Categorías --</option>
							<option th:each="item : ${tiposCategoria}"
									th:value="${item.idCategoria}"
									th:text="${item.nombreCategoria}">
							</option>
						</select>
					</div>
					<div class="col-md-2">
						<button type="submit" class="btn btn-primary w-100">
							<i class="fa-solid fa-magnifying-glass"></i> Consultar
						</button>
					</div>
				</form>

				<table class="table table-hover table-responsive align-middle">
					<thead class="table-dark">
						<tr>
							<th class="text-center" style="width: 10%;">ID</th>
							<th class="text-start">Título del Videojuego</th>
							<th class="text-center" style="width: 15%;">Precio ($)</th>
							<th class="text-center" style="width: 25%;">Categoría / Plataforma</th>
						</tr>
					</thead>
					<tbody class="table-secondary">
						<tr th:each="item : ${lstJuegos}">
							<td th:text="${item.idJuego}" class="text-center"></td>
							<td th:text="${item.titulo}" class="text-start"></td>
							<td th:text="${'$' + item.precio}" class="text-center"></td>
							<td th:text="${item.categoria.nombreCategoria}" class="text-center"></td>
						</tr>
					</tbody>
				</table>

			</div>
		</div>
	</div>
</body>
</html>
