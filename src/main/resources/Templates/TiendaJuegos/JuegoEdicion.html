<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Ejemplos Prof. Ernesto Arbulú</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				
				<h1 class="card-title text-center mb-4" th:text="|ACTUALIZAR PRECIO DEL JUEGO ID: ${juego.idJuego}|"></h1>
				
				<div class="row d-flex justify-content-center">
					<div class="col-md-6">
						
						<form th:action="@{/juego/guardarPrecio}" method="post" class="row g-3" id="formEditarJuego" novalidate>
							
							<input type="hidden" name="idJuego" th:value="${juego.idJuego}" />

							<div class="col-md-12">
								<label class="form-label">Título del Videojuego</label>
								<div class="input-group">
									<span class="input-group-text"><i class="fa-solid fa-gamepad"></i></span>
									<input type="text" class="form-control bg-light" th:value="${juego.titulo}" readonly />
								</div>
							</div>

							<div class="col-md-12">
								<label class="form-label">Categoría / Plataforma</label>
								<div class="input-group">
									<span class="input-group-text"><i class="fa-solid fa-tags"></i></span>
									<input type="text" class="form-control bg-light" th:value="${juego.categoria.nombreCategoria}" readonly />
								</div>
							</div>

							<div class="col-md-12 position-relative">
								<label for="precio" class="form-label">Precio ($)</label>
								<div class="input-group">
									<span class="input-group-text"><i class="fa-solid fa-money-bill-wave"></i></span>
									<input type="number" step="0.01" class="form-control" id="precio" name="precio" 
										   th:value="${juego.precio}" required>
								</div>
							</div>

							<div class="col-md-12 d-flex justify-content-between mt-4">
								<a th:href="@{/juego/listado}" class="btn btn-outline-dark">
									<i class="fa-solid fa-reply"></i> Cancelar
								</a>
								<button type="submit" class="btn btn-primary">
									<i class="fa-solid fa-floppy-disk"></i> Actualizar Precio
								</button>
							</div>
						</form>

					</div>
				</div>
			</div>
		</div>
	</div>

	<script type="text/javascript">
		$(document).ready(function () {
			// CORREGIDO: Ahora apunta a #formEditarJuego
			$("#formEditarJuego").validate({
				rules: {
					// CORREGIDO: Validamos el campo 'precio' obligatoriamente mayor o igual a 0
					precio: { 
						required: true, 
						min: 0 
					}
				},
				messages: {
					precio: { 
						required: "Por favor, ingrese el nuevo precio.",
						min: "El precio no puede ser menor a 0."
					}
				},
				errorElement: 'div',
				errorClass: 'invalid-tooltip',
				highlight: function (element) {
					$(element).addClass('is-invalid').removeClass('is-valid');
				},
				unhighlight: function (element) {
					$(element).removeClass('is-invalid').addClass('is-valid');
				}
			});
		});
	</script>
	
	<th:block th:utext="${alert}"></th:block>
</body>
</html>
