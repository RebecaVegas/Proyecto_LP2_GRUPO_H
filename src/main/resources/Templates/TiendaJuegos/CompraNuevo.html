<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Sistema - Emitir Boleta</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">
	<div class="container mt-5">
		<div class="card shadow-lg border-0">
			<div class="card-header bg-dark text-white py-3 text-center">
				<h2 class="card-title m-0"><i class="fa-solid fa-file-invoice-dollar me-2"></i>Emitir Nueva Boleta de Venta</h2>
			</div>
			<div class="card-body p-4">
				<div class="row d-flex justify-content-center">
					<div class="col-md-6">
						<form th:action="@{/compra/registrar}" th:object="${compra}" class="row g-3" method="post"
							novalidate id="formCompra">
							
							<div class="col-md-12 position-relative">
								<label for="juego" class="form-label fw-bold">Videojuego</label>
								<div class="input-group">
									<span class="input-group-text">
										<i class="fa-solid fa-gamepad text-secondary"></i>
									</span>
									<select class="form-select" th:field="*{juego}" required id="juego">
										<option value="" selected hidden="hidden">--Seleccione un videojuego--</option>
										<option th:each="item: ${juegos}" th:value="${item.idJuego}"
											th:text="${item.titulo} + ' - $' + ${item.precio}"></option>
									</select>
								</div>
							</div>

							<div class="col-md-12 position-relative">
								<label for="cantidad" class="form-label fw-bold">Cantidad</label>
								<div class="input-group">
									<span class="input-group-text">
										<i class="fa-solid fa-cart-shopping text-secondary"></i>
									</span>
									<input type="number" class="form-control" placeholder="Ingrese la cantidad" 
										th:field="*{cantidad}" min="1" required id="cantidad">
								</div>
							</div>

							<div class="col-md-12">
								<div class="alert alert-info py-2 px-3 m-0 small border-0">
									<i class="fa-solid fa-circle-info me-1"></i> El sistema generará la <strong>Boleta</strong> y su respectivo <strong>Detalle Boleta</strong> de forma automática en la base de datos.
								</div>
							</div>

							<hr class="my-3 text-muted">

							<div class="col-md-12 d-flex justify-content-between mt-2">
								<a th:href="@{/compra/listado}" class="btn btn-outline-dark">
									<i class="fa-solid fa-reply"></i> Regresar
								</a>
								<div class="gap-2 d-flex">
									<button type="reset" class="btn btn-secondary">
										<i class="fa-solid fa-broom"></i> Limpiar
									</button>
									<button type="submit" class="btn btn-success fw-bold">
										<i class="fa-solid fa-receipt me-1"></i> Generar Comprobante
									</button>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script type="text/javascript">
		$(document).ready(function () {
			$("#formCompra").validate({
				rules: {
					juego: { required: true },
					cantidad: { required: true, min: 1 }
				},
				messages: {
					juego: { required: "Por favor, seleccione un videojuego." },
					cantidad: { 
						required: "Por favor, ingrese una cantidad.",
						min: "La cantidad mínima debe ser 1."
					}
				},
				errorElement: 'div',
				errorClass: 'invalid-tooltip',
				highlight: function (element) {
					$(element).addClass('is-invalid').removeClass('is-valid');
				},
				unhighlight: function (element) {
					$(element).removeClass('is-invalid').addClass('is-valid');
				}
			});
		});
	</script>
	
	<th:block th:utext="${alert}"></th:block>
</body>

</html>
