<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Ejemplos Prof. Ernesto Arbulú</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>


<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				
				<h1 class="card-title text-center mb-4" th:text="|EDITAR COMPRA  ${compra.idCompra}|"></h1>
				<div class="row d-flex justify-content-center">
					<div class="col-md-6">
						
						<form th:action="@{/compra/guardar}" th:object="${compra}" class="row g-3" method="post"
							novalidate id="formEditarCompra">
							
							
							<input type="hidden" th:field="*{idCompra}">
							<input type="hidden" th:field="*{fechaCompra}">
							<input type="hidden" th:field="*{total}"> 

							
							<div class="col-md-12 position-relative">
								<label for="juego" class="form-label">Videojuego</label>
								<div class="input-group">
									<span class="input-group-text">
										<i class="fa-solid fa-gamepad"></i>
									</span>
									<select class="form-select" th:field="*{juego}" required>
										<option th:each="item: ${juegos}" th:value="${item.idJuego}"
											th:text="${item.titulo} + ' - $' + ${item.precio}"></option>
									</select>
								</div>
							</div>

							
							<div class="col-md-12 position-relative">
								<label for="cantidad" class="form-label">Cantidad</label>
								<div class="input-group">
									<span class="input-group-text">
										<i class="fa-solid fa-cart-shopping"></i>
									</span>
									<input type="number" class="form-control" placeholder="Ingrese la cantidad" 
										th:field="*{cantidad}" min="1" required>
								</div>
							</div>

							
							<div class="col-md-12 d-flex justify-content-between mt-4">
								
								<a th:href="@{/compra/listado}" class="btn btn-outline-dark">
									<i class="fa-solid fa-reply"></i> Regresar
								</a>
								
								<button type="submit" class="btn btn-primary">
									<i class="fa-solid fa-floppy-disk"></i> Guardar
								</button>
								
								<button type="reset" class="btn btn-secondary">
									<i class="fa-solid fa-broom"></i> Limpiar
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Script de Validación JS del Profesor -->
	<script type="text/javascript">
		$(document).ready(function () {
			$("#formEditarCompra").validate({
				rules: {
					juego: { required: true },
					cantidad: { required: true, min: 1 }
				},
				messages: {
					juego: { required: "Por favor, seleccione un videojuego." },
					cantidad: { 
						required: "Por favor, ingrese una cantidad.",
						min: "La cantidad mínima debe ser 1."
					}
				},
				errorElement: 'div',
				errorClass: 'invalid-tooltip',
				highlight: function (element) {
					$(element).addClass('is-invalid').removeClass('is-valid');
				},
				unhighlight: function (element) {
					$(element).removeClass('is-invalid').addClass('is-valid');
				}
			});
		});
	</script>
	
	<!-- Inyección automática del SweetAlert desde el controlador si falla algo -->
	<th:block th:utext="${alert}"></th:block>
</body>

</html>
</body>

</html>
