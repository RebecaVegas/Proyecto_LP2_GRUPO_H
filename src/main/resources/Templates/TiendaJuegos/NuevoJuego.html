<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<title>Registrar Juego Nuevo</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.21.0/jquery.validate.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
	<div class="container mt-5">
		<div class="card shadow-lg">
			<div class="card-body">
				<h1 class="card-title text-center mb-4">Juego Nuevo</h1>
				<div class="row d-flex justify-content-center">
					<div class="col-md-6">
						<form th:action="@{/juego/registrar}" th:object="${juego}" class="row g-3" method="post"
							novalidate id="formJuego">
							
							<div class="col-md-12 position-relative">
								<label for="titulo" class="form-label">Título del Juego</label>
								<div class="input-group">
									<span class="input-group-text">
										<i class="fa-solid fa-gamepad"></i>
									</span>
									<input type="text" class="form-control" placeholder="Ingrese el título del juego" 
										th:field="*{titulo}" required>
								</div>
							</div>

							<div class="col-md-12 position-relative">
								<label for="precio" class="form-label">Precio</label>
								<div class="input-group">
									<span class="input-group-text">S/.</span>
									<input type="number" class="form-control" placeholder="Ej: 49.90" 
										step="0.01" th:field="*{precio}" required>
								</div>
							</div>

							<div class="col-md-12 position-relative mb-3">
							    <label for="categoria" class="form-label">Categoría</label>
							    
							    <div class="input-group">
							        <span class="input-group-text">
							            <i class="fa-solid fa-tags" aria-hidden="true"></i>
							        </span>
							        
							        <select class="form-select" th:field="*{categoria.idCategoria}" id="categoria" required>
							            <option value="" selected disabled hidden>--Seleccione una categoría--</option>
							            <option th:each="cat : ${categorias}" 
							                    th:value="${cat.idCategoria}" 
							                    th:text="${cat.nombreCategoria}">
							            </option>
							        </select>
							    </div>
							</div>

							<div class="col-md-12 d-flex justify-content-between mt-4">
								<a th:href="@{/juego/listado}" class="btn btn-outline-dark">
									<i class="fa-solid fa-reply"></i> Regresar
								</a>
								<button type="submit" class="btn btn-primary">
									<i class="fa-solid fa-floppy-disk"></i> Registrar
								</button>
								<button type="reset" class="btn btn-secondary">
									<i class="fa-solid fa-broom"></i> Limpiar
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script type="text/javascript">
		$(document).ready(function () {
			$("#formJuego").validate({
				rules: {
					titulo: { required: true },
					precio: { required: true, min: 0.01 },
					categoria: { required: true }
				},
				messages: {
					titulo: { required: "Por favor, ingrese el título del juego." },
					precio: { 
						required: "Por favor, ingrese el precio.",
						min: "El precio mínimo debe ser 0.01."
					},
					categoria: { required: "Por favor, seleccione una categoría." }
				},
				errorElement: 'div',
				errorClass: 'invalid-tooltip',
				highlight: function (element) {
					$(element).addClass('is-invalid').removeClass('is-valid');
				},
				unhighlight: function (element) {
					$(element).removeClass('is-invalid').addClass('is-valid');
				}
			});
		});
	</script>
	
	<th:block th:utext="${alert}"></th:block>
</body>

</html>
